<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mathis - Don't Click It</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Kalam:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="app">
      <svg width="0" height="0" style="position:absolute;" aria-hidden="true">
        <defs>
          <filter id="wob" x="-5%" y="-5%" width="110%" height="110%">
            <feTurbulence data-turb baseFrequency="0.025" numOctaves="2" seed="3" result="turb" />
            <feDisplacementMap in="SourceGraphic" in2="turb" scale="2.5" />
          </filter>
          <filter id="wob2" x="-5%" y="-5%" width="110%" height="110%">
            <feTurbulence data-turb baseFrequency="0.04" numOctaves="2" seed="11" result="turb" />
            <feDisplacementMap in="SourceGraphic" in2="turb" scale="2" />
          </filter>
        </defs>
      </svg>

      <header class="hud">
        <div class="hud-item">round <span class="hud-value" data-hud="round">&mdash;</span></div>
        <div class="hud-item">score <span class="hud-value" data-hud="score">0</span></div>
        <div class="hud-item">streak <span class="hud-value hud-streak" data-hud="streak">0</span></div>
        <div class="hud-item">lives <span class="hud-value" data-hud="lives">3</span></div>
        <div class="hud-item">best <span class="hud-value hud-best" data-hud="best">0</span></div>
      </header>

      <section class="stage" data-stage>
        <svg class="stage-border" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
          <rect x="1" y="1" width="98" height="98" fill="none" stroke="currentColor" stroke-width="0.4" filter="url(#wob)" />
        </svg>

        <svg class="corner-creature tl" viewBox="0 0 64 64" aria-hidden="true">
          <g fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#wob2)">
            <path d="M12,34 Q12,14 32,14 Q52,14 52,34 Q52,52 32,52 Q12,52 12,34 Z" />
            <circle cx="24" cy="30" r="2.5" fill="currentColor" />
            <circle cx="40" cy="30" r="2.5" fill="currentColor" />
            <path d="M22,42 Q32,48 42,42" />
            <path d="M20,14 L16,8 M32,12 L32,6 M44,14 L48,8" />
          </g>
        </svg>
        <svg class="corner-creature tr" viewBox="0 0 64 64" aria-hidden="true">
          <g fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#wob2)">
            <path d="M20,24 Q20,12 32,12 Q44,12 44,24 L44,50 L38,46 L32,52 L26,46 L20,50 Z" />
            <circle cx="28" cy="26" r="1.5" fill="currentColor" />
            <circle cx="36" cy="26" r="1.5" fill="currentColor" />
            <path d="M28,34 L36,34" />
          </g>
        </svg>
        <svg class="corner-creature br" viewBox="0 0 64 64" aria-hidden="true">
          <g fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#wob2)">
            <path d="M14,50 Q14,34 32,34 Q50,34 50,50 L50,56 L14,56 Z" />
            <circle cx="26" cy="44" r="2" fill="currentColor" />
            <circle cx="38" cy="44" r="2" fill="currentColor" />
            <path d="M26,52 Q32,54 38,52" />
            <path d="M32,34 L32,20 M26,22 L32,16 L38,22" />
          </g>
        </svg>

        <div class="bubble-wrap">
          <svg class="bubble-svg" viewBox="0 0 440 130" preserveAspectRatio="none" aria-hidden="true">
            <path d="M15,20 Q15,8 30,8 L410,8 Q425,8 425,20 L425,90 Q425,103 410,103 L260,103 L240,125 L235,103 L30,103 Q15,103 15,90 Z"
                  fill="var(--bubble)" stroke="currentColor" stroke-width="2" filter="url(#wob)" />
          </svg>
          <span class="bubble-text muted" data-narrator>Press begin when you're ready.</span>
        </div>

        <div class="play-area" data-play-area>
          <div class="big-button" data-button>
            <svg viewBox="0 0 140 140" aria-hidden="true">
              <circle cx="70" cy="70" r="58" fill="var(--accent)" stroke="var(--accent-dark)" stroke-width="3" filter="url(#wob2)" />
            </svg>
            <span class="big-button-label" data-button-label>Don't click</span>
          </div>
          <div class="flash" data-flash></div>
        </div>

        <div class="timer" data-timer></div>
      </section>

      <footer class="controls">
        <button class="start-btn" data-start type="button">Begin</button>
        <button class="mute-btn" data-mute type="button" aria-label="Toggle sound">
          <svg class="mute-icon" data-mute-on viewBox="0 0 32 32" aria-hidden="true">
            <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#wob2)">
              <path d="M6,12 L6,20 L11,20 L18,25 L18,7 L11,12 Z" fill="currentColor" />
              <path d="M22,12 Q25,16 22,20" />
              <path d="M25,9 Q30,16 25,23" />
            </g>
          </svg>
          <svg class="mute-icon hidden" data-mute-off viewBox="0 0 32 32" aria-hidden="true">
            <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#wob2)">
              <path d="M6,12 L6,20 L11,20 L18,25 L18,7 L11,12 Z" fill="currentColor" />
              <path d="M22,12 L28,20 M28,12 L22,20" />
            </g>
          </svg>
        </button>
        <button class="mute-btn" data-settings-toggle type="button" aria-label="Settings">
          <svg viewBox="0 0 32 32" aria-hidden="true" style="width:100%;height:100%">
            <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" filter="url(#wob2)">
              <circle cx="16" cy="16" r="5" />
              <path d="M16,4 L16,8 M16,24 L16,28 M4,16 L8,16 M24,16 L28,16 M7.5,7.5 L10.3,10.3 M21.7,21.7 L24.5,24.5 M24.5,7.5 L21.7,10.3 M10.3,21.7 L7.5,24.5" />
            </g>
          </svg>
        </button>
      </footer>

    </main>

    <div class="settings-overlay hidden" data-settings>
      <div class="settings-backdrop" data-settings-close></div>
      <div class="settings-card">
        <svg class="settings-card-border" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
          <rect x="1" y="1" width="98" height="98" rx="2" fill="none" stroke="var(--ink)" stroke-width="0.5" filter="url(#wob)" />
        </svg>

        <button class="settings-close" data-settings-close type="button" aria-label="Close settings">
          <svg viewBox="0 0 28 28" aria-hidden="true">
            <g fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" filter="url(#wob2)">
              <path d="M8,8 L20,20 M20,8 L8,20" />
            </g>
          </svg>
        </button>

        <span class="settings-title">~ knobs ~</span>

        <div class="settings-row">
          <svg class="settings-icon" viewBox="0 0 28 28" aria-hidden="true">
            <g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" filter="url(#wob2)">
              <path d="M4,10 L4,18 L8,18 L13,22 L13,6 L8,10 Z" fill="currentColor" />
              <path d="M17,11 Q19,14 17,17" />
              <path d="M20,8 Q24,14 20,20" />
            </g>
          </svg>
          <span class="settings-label">sfx</span>
          <div class="slider-wrap">
            <input type="range" min="0" max="1" step="0.05" value="0.5" data-slider="sfx" />
          </div>
          <span class="settings-val" data-slider-val="sfx">50</span>
        </div>

        <div class="settings-row">
          <svg class="settings-icon" viewBox="0 0 28 28" aria-hidden="true">
            <g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" filter="url(#wob2)">
              <path d="M3,14 Q7,6 11,14 Q15,22 19,14 Q23,6 27,14" />
            </g>
          </svg>
          <span class="settings-label">drone</span>
          <div class="slider-wrap">
            <input type="range" min="0" max="0.3" step="0.005" value="0.067" data-slider="drone" />
          </div>
          <span class="settings-val" data-slider-val="drone">7</span>
        </div>

        <div class="settings-row">
          <svg class="settings-icon" viewBox="0 0 28 28" aria-hidden="true">
            <g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" filter="url(#wob2)">
              <path d="M5,9 Q5,4 10,4 L18,4 Q23,4 23,9 L23,16 Q23,21 18,21 L14,21 L10,25 L10,21 Q5,21 5,16 Z" />
              <path d="M10,10 L18,10 M10,14 L15,14" />
            </g>
          </svg>
          <span class="settings-label">voice</span>
          <div class="slider-wrap">
            <input type="range" min="0" max="2" step="0.1" value="1" data-slider="voice" />
          </div>
          <span class="settings-val" data-slider-val="voice">100</span>
        </div>

        <div class="settings-row settings-row--wrap">
          <svg class="settings-icon" viewBox="0 0 28 28" aria-hidden="true">
            <g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" filter="url(#wob2)">
              <path d="M4,20 L10,8 L16,16 L20,10 L24,20" />
            </g>
          </svg>
          <span class="settings-label">speed</span>
          <div class="diff-group">
            <button class="diff-btn" data-diff="2.0"  type="button">super duper easy</button>
            <button class="diff-btn" data-diff="1.4"  type="button">easy</button>
            <button class="diff-btn active" data-diff="1.0"  type="button">normal</button>
            <button class="diff-btn" data-diff="0.65" type="button">fast</button>
            <button class="diff-btn" data-diff="0.38" type="button">still human?</button>
          </div>
        </div>

        <svg class="settings-creature" viewBox="0 0 64 64" aria-hidden="true">
          <g fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#wob2)">
            <path d="M16,38 Q16,22 32,22 Q48,22 48,38 Q48,52 32,52 Q16,52 16,38 Z" />
            <circle cx="26" cy="35" r="2" fill="currentColor" />
            <circle cx="38" cy="35" r="2" fill="currentColor" />
            <path d="M28,44 Q32,47 36,44" />
            <path d="M24,22 L22,14 M32,20 L32,12 M40,22 L42,14" />
          </g>
        </svg>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
